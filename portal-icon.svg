<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background fills full square (required for maskable adaptive icons) -->
  <rect width="512" height="512" fill="#0f0f0f"/>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.4"/>

  <!-- Gold filled circle -->
  <circle cx="256" cy="256" r="196" fill="#c9a84c"/>

  <!-- Inner dark circle -->
  <circle cx="256" cy="256" r="172" fill="#0f0f0f"/>

  <!-- Inner gold thin ring -->
  <circle cx="256" cy="256" r="158" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>

  <!-- V B monogram -->
  <text x="256" y="235"
    font-family="'Palatino Linotype', Georgia, 'Times New Roman', serif"
    font-size="108" font-weight="700" letter-spacing="4"
    text-anchor="middle" fill="#c9a84c">VB</text>

  <!-- Decorative line under monogram -->
  <line x1="186" y1="258" x2="326" y2="258" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- PORTAL label -->
  <text x="256" y="300"
    font-family="'Futura', 'Trebuchet MS', Arial, sans-serif"
    font-size="22" font-weight="400" letter-spacing="10"
    text-anchor="middle" fill="#c9a84c" opacity="0.75">PORTAL</text>

  <!-- Small butterfly dots decoration -->
  <circle cx="204" cy="320" r="3" fill="#c9a84c" opacity="0.4"/>
  <circle cx="256" cy="326" r="3" fill="#c9a84c" opacity="0.4"/>
  <circle cx="308" cy="320" r="3" fill="#c9a84c" opacity="0.4"/>
</svg>
